name: daily-lunch-bot

on:
  # No 'schedule:' trigger — GitHub's cron is unreliable (delayed/dropped).
  # An external scheduler (cron-job.org) calls this via workflow_dispatch
  # at ~08:00 local with mode=full (scrape-with-retries + post in one run).
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'full'
        type: choice
        options:
          - scrape
          - send
          - send-final
          - full

permissions:
  contents: write

concurrency:
  group: gablec-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system --no-cache .

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "0 6 * * 1-5")  echo "mode=send" >> "$GITHUB_OUTPUT" ;;
              "30 7 * * 1-5") echo "mode=send-final" >> "$GITHUB_OUTPUT" ;;
              *)              echo "mode=scrape" >> "$GITHUB_OUTPUT" ;;
            esac
          fi
          echo "Detected mode: $(grep mode "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Run lunch bot
        run: python main.py --mode ${{ steps.mode.outputs.mode }}
        working-directory: gablec_script

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- menu_cache.json; then
            echo "No cache changes to commit."
          else
            # Commit our clean change first, so a conflicted file is never staged.
            git add menu_cache.json
            git commit -m "chore: update menu cache [skip ci]"
            # Push; if the remote moved (e.g. a manual push), rebase our commit
            # and retry once. Abort cleanly on conflict rather than pushing
            # corrupt JSON; the next scheduled run rebuilds the cache.
            if ! git push; then
              echo "Push rejected; rebasing on remote and retrying."
              git pull --rebase origin "${{ github.ref_name }}" \
                || { echo "Rebase conflict; aborting (cache will be rebuilt next run)."; git rebase --abort 2>/dev/null; exit 1; }
              git push
            fi
          fi
